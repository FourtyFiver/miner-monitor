# Miner configuration
# Add your miners here. The monitor polls each miner's API.
# Supported types: cgminer (default, port 4028), ccminer (port 4068), xmrig (HTTP API)
miners:
  # ── ASIC miner (cgminer/ccminer — default type, TCP binary API) ──
  - name: example_asic
    host: 192.168.1.100
    port: 4028
    # type: cgminer  # default, can be omitted

  # ── CPU miner (XMRig — HTTP API with Bearer token auth) ──
  - name: example_xmrig
    host: 192.168.1.200
    port: 18088
    type: xmrig
    api_token: your_token_here
